<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- tailwind + daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font related -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200">
      <section class="w-11/12 mx-auto flex py-3 justify-between items-center">
        <div class="left flex">
          <div class="w-[60px]">
            <img src="./assets/logo.png" alt="" />
          </div>
          <div>
            <h2>$ <span id="balance">5000</span></h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a class="btn" href="./index.html"
            ><span><i class="fa-solid fa-arrow-right-from-bracket"></i></span
            >Log out</a
          >
        </div>
      </section>
    </header>
    <section class="w-11/12 mx-auto space-y-3 py-5">
      <div>
        <h1 class="text-3xl font-bold">
          Welcome to Pay<span class="text-primary">oo</span>
        </h1>
        <p class="text-neutral/50 mt-3">
          Enjoy easy and convenient financial services with Us<br />Cashout
          charge is low and
        </p>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <button onclick="showAddMoney('add-money')" class="btn flex-col h-full py-4">
          <img src="./assets/opt-1.png" alt="" />
          <p>Add money</p>
        </button>
        <button onclick="showCashout('cashout')" class="btn flex-col h-full py-4">
          <img src="./assets/opt-2.png" alt="" />
          <p>Cashout</p>
        </button>
        <button class="btn flex-col h-full py-4">
          <img src="./assets/opt-3.png" alt="" />
          <p>Send Money</p>
        </button>
        <button class="btn flex-col h-full py-4">
          <img src="./assets/opt-4.png" alt="" />
          <p>Get Bonus</p>
        </button>
        <button class="btn flex-col h-full py-4">
          <img src="./assets/opt-5.png" alt="" />
          <p>Pay Bill</p>
        </button>
        <button class="btn flex-col h-full py-4">
          <img src="./assets/opt-6.png" alt="" />
          <p>Transactions</p>
        </button>
      </div>
    </section>
    <section id="add-money" class="w-11/12 mx-auto">
      <h2 class="text-2xl font-bold">Add money</h2>
      <div class="card-body bg-base-100 w-full">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Select A Bank</label>
          <select id="add-bank-name" class="select w-full rounded-2xl bg-base-200">
            <option>Select a bank</option>
            <option value="DBBL">DBBL</option>
            <option value="Jamuna Bank">Jamuna Bank</option>
            <option value="Dhaka Bank">Dhaka Bank</option>
          </select>
          <label class="label text-neutral font-bold"
            >Bank Account Number</label
          >
          <input
            id="add-money-num"
            type=""
            class="input bg-base-200 rounded-2xl w-full"
            placeholder="Enter 11 digit account number"
          />
          <label class="label text-neutral font-bold">Amount to Add</label>
          <input
            id="add-money-amount"
            type="number"
            class="input bg-base-200 rounded-2xl w-full"
            placeholder=""
          />
          <label class="label text-neutral font-bold">Pin Number</label>
          <input
            id="add-money-pin"
            type="password"
            class="input bg-base-20 rounded-2xl w-full"
            placeholder="Enter 4 digit Pin number"
          />
          <button id="add-money-btn" class="btn btn-primary rounded-2xl mt-4">
            Add Money
          </button>
        </fieldset>
      </div>
    </section>
    <section id="cashout" class="w-11/12 mx-auto hidden">
      <h2 class="text-2xl font-bold">Cashout</h2>
      <div class="card-body bg-base-100 w-full">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input
            id="agent-num"
            type=""
            class="input bg-base-200 rounded-2xl w-full"
            placeholder="Enter 11 digit number"
          />
          <label class="label text-neutral font-bold">Amount</label>
          <input
            id="cashout-amount"
            type=""
            class="input bg-base-200 rounded-2xl w-full"
            placeholder="Enter amount to withdraw"
          />
          <label class="label text-neutral font-bold">Pin Number</label>
          <input
            id="cashout-pin"
            type="password"
            class="input bg-base-20 rounded-2xl w-full"
            placeholder="Enter 4 digit Pin number"
          />
          <button id="cashout-btn" class="btn btn-primary rounded-2xl mt-4">
            Withdraw Money
          </button>
        </fieldset>
      </div>
    </section>
    <script src="./js/cashout.js"></script>
    <script src="./js/addmoney.js"></script>
    <script src="./js/machine.js"></script>
  </body>
</html>
